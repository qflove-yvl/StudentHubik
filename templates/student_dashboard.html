{% extends "base.html" %}
{% block content %}

<div class="dashboard">
    <h2>Ваши оценки</h2>

    {% if grades %}
        {% for grade in grades %}
            <div class="panel grade-panel">
                <strong>{{ grade.subject }}</strong>
                <div class="grade-meta">
                    Оценка: <span class="grade-badge">{{ grade.value }}</span>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="panel empty-state">Пока нет оценок. Они появятся после выставления преподавателем.</div>
    {% endif %}

</div>

{% endblock %}
